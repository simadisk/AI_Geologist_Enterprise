name: Backend CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Λήψη του κώδικα (Checkout)
      uses: actions/checkout@v3

    - name: 🐍 Στήσιμο Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 📦 Εγκατάσταση βασικών βιβλιοθηκών
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: 🔍 Έλεγχος Ποιότητας Κώδικα (Flake8 Linter)
      run: |
        flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: 🐳 Δοκιμή "Χτισίματος" του Docker Backend
      run: |
        docker compose build backend